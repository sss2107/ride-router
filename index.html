<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f8fff8" />
    <title>Ride Router</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="masthead">
        <span class="brand-mark" aria-hidden="true"></span>
        <h1>Ride Router</h1>
      </header>

      <form class="prompt-form" id="commandForm">
        <label class="sr-only" for="commandInput">Ride request</label>
        <textarea
          id="commandInput"
          autocomplete="off"
          rows="4"
          placeholder="find the cheapest app from xx to yy"
        ></textarea>
        <div class="form-actions">
          <button id="sendCommandButton" type="submit">Send</button>
          <button id="demoCommandButton" class="secondary-button" type="button">Demo run</button>
        </div>
      </form>

      <section class="fare-actions hidden" id="commandOutput" aria-live="polite"></section>
      <p class="status-line" id="statusLine"></p>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
